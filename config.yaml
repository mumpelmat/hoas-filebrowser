name: "Local File Browser"
version: "0.1.3"
slug: "local_file_browser"
description: "Simple private file browser for Home Assistant OS with upload, download, copy, move, rename and delete."
url: "https://github.com/mumpelmat/hoas-filebrowser"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: manual
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:folder-multiple
panel_title: "Files"
map:
  - type: config
    read_only: false
  - type: share
    read_only: false
  - type: media
    read_only: false
  - type: ssl
    read_only: false
  - type: addons
    read_only: false
  - type: backup
    read_only: false
options:
  allowed_roots:
    - config
    - share
    - media
    - ssl
    - addons
    - backup
  max_upload_mb: 500
schema:
  allowed_roots:
    - str
  max_upload_mb: int
